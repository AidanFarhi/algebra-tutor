services:

  db:
    image: postgres:16
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: algtutor
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  db-migration:
    build: ./db-migration
    depends_on:
      db:
        condition: service_healthy

  web-app:
    build: ./web-app
    ports:
      - "8090:8090"
    depends_on:
      db-migration:
        condition: service_completed_successfully

  ai-service:
    build: ./ai-service
    ports:
      - "8000:8000"
    depends_on:
      db-migration:
        condition: service_completed_successfully

volumes:
  postgres_data: